<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozon Analytics — Ариадна</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, system-ui, sans-serif; background: #0f0f12; color: #e8e8f0; min-height: 100vh; }
.header { background: linear-gradient(135deg,#1a1a2e,#16213e); border-bottom: 1px solid #2a2a3e; padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
.logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg,#005bff,#00d4ff); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: #fff; flex-shrink: 0; }
.body { padding: 20px; max-width: 600px; margin: 0 auto; }
.card { background: #1a1a2e; border-radius: 16px; padding: 20px; border: 1px solid #2a2a3e; margin-bottom: 14px; }
.note { font-size: 13px; color: #6b7280; margin-bottom: 16px; line-height: 1.5; }
label { display: block; margin-bottom: 4px; font-size: 12px; color: #9ca3af; font-weight: 500; }
input { width: 100%; padding: 12px 14px; border-radius: 10px; background: #0f0f12; border: 1px solid #2a2a3e; color: #e8e8f0; font-size: 15px; margin-bottom: 14px; outline: none; }
.btn { width: 100%; padding: 16px; background: linear-gradient(135deg,#005bff,#0095ff); border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
.btn:disabled { background: #1a2a3a; cursor: not-allowed; }
.error { background: #2a1010; border: 1px solid #5a1010; border-radius: 12px; padding: 14px; color: #f87171; font-size: 13px; margin-bottom: 14px; line-height: 1.5; display:none; }
.debug { background: #0f1a0f; border: 1px solid #1a3a1a; border-radius: 12px; padding: 12px; margin-bottom: 14px; font-family: monospace; font-size: 11px; color: #4ade80; display:none; word-break: break-all; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.sum-card { background: #1a1a2e; border-radius: 14px; padding: 16px; border: 1px solid #2a2a3e; }
.sum-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
.sum-val { font-size: 20px; font-weight: 700; }
.tabs { display: flex; gap: 6px; margin-bottom: 16px; background: #1a1a2e; border-radius: 12px; padding: 4px; border: 1px solid #2a2a3e; }
.tab { flex: 1; padding: 8px 4px; border-radius: 8px; border: none; background: transparent; color: #6b7280; font-size: 12px; cursor: pointer; }
.tab.active { background: #005bff; color: #fff; font-weight: 600; }
.prod { background: #1a1a2e; border-radius: 14px; padding: 16px; border: 1px solid #2a2a3e; margin-bottom: 10px; }
.prod-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.prod-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.prod-id { font-size: 11px; color: #6b7280; margin-bottom: 2px; }
.badge { border-radius: 8px; padding: 4px 10px; font-size: 15px; font-weight: 700; white-space: nowrap; flex-shrink: 0; margin-left: 10px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.mini { background: #0f0f12; border-radius: 8px; padding: 8px 10px; }
.mini-label { font-size: 10px; color: #6b7280; margin-bottom: 2px; }
.mini-val { font-size: 13px; font-weight: 600; }
.diff-row { margin-top: 8px; background: #0f0f12; border-radius: 8px; padding: 8px 10px; display: flex; justify-content: space-between; }
.settings-btn { margin-left: auto; background: none; border: 1px solid #2a2a3e; color: #9ca3af; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; display:none; }
#results { display: none; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">O</div>
  <div>
    <div style="font-size:16px;font-weight:700">Ozon Analytics</div>
    <div style="font-size:11px;color:#6b7280">Наценка · 30 дней</div>
  </div>
  <button class="settings-btn" id="settingsBtn" onclick="showSettings()">⚙ Ключи</button>
</div>

<div class="body">
  <div id="settings">
    <div class="card">
      <div class="note">Данные хранятся только на этом устройстве.</div>
      <label>Client ID</label>
      <input type="text" inputmode="numeric" id="clientId" placeholder="2375416">
      <label>API ключ</label>
      <input type="password" id="apiKey" placeholder="••••••••••••">
      <label>Telegram Bot Token</label>
      <input type="text" id="tgToken" placeholder="8819121520:AAG...">
      <label>Telegram Chat ID</label>
      <input type="text" id="tgChatId" placeholder="8819121520">
    </div>
    <div class="debug" id="debugLog"></div>
    <div class="error" id="errorBox"></div>
    <button class="btn" id="loadBtn" onclick="fetchData()">Загрузить статистику →</button>
  </div>

  <div id="results">
    <div class="grid2">
      <div class="sum-card">
        <div class="sum-label">ВЫПЛАТЫ ИТОГО</div>
        <div class="sum-val" id="totalAccrual" style="color:#00d4ff"></div>
      </div>
      <div class="sum-card">
        <div class="sum-label">НАЦЕНКА ОБЩАЯ</div>
        <div class="sum-val" id="totalMargin"></div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="sortBy('revenue',this)">По выплате</button>
      <button class="tab" onclick="sortBy('margin',this)">По наценке</button>
      <button class="tab" onclick="sortBy('qty',this)">По кол-ву</button>
    </div>
    <div id="prodList"></div>
  </div>
</div>

<script>
let allProducts = [];
let currentSort = 'revenue';

function ls(k,v){ try{ if(v===undefined) return localStorage.getItem(k); localStorage.setItem(k,v); }catch(e){} }
window.onload = () => {
  document.getElementById('clientId').value = ls('oz_cid')||'';
  document.getElementById('apiKey').value = ls('oz_key')||'';
  document.getElementById('tgToken').value = ls('oz_tgt')||'';
  document.getElementById('tgChatId').value = ls('oz_tgc')||'';
};
function saveCreds(){ ls('oz_cid',document.getElementById('clientId').value); ls('oz_key',document.getElementById('apiKey').value); ls('oz_tgt',document.getElementById('tgToken').value); ls('oz_tgc',document.getElementById('tgChatId').value); }
function log(msg){ const el=document.getElementById('debugLog'); el.style.display='block'; el.innerHTML+='› '+msg+'<br>'; }
function showError(msg){ const el=document.getElementById('errorBox'); el.style.display='block'; el.textContent='⚠ '+msg; }
function showSettings(){ document.getElementById('settings').style.display='block'; document.getElementById('results').style.display='none'; document.getElementById('settingsBtn').style.display='none'; document.getElementById('debugLog').style.display='none'; document.getElementById('debugLog').innerHTML=''; document.getElementById('errorBox').style.display='none'; }

async function ozon(endpoint, body){
  const r = await fetch('https://api-seller.ozon.ru'+endpoint, {
    method:'POST',
    headers:{ 'Client-Id': document.getElementById('clientId').value, 'Api-Key': document.getElementById('apiKey').value, 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error('Ozon API '+r.status+' '+endpoint);
  return r.json();
}

async function tg(text){
  const token=document.getElementById('tgToken').value;
  const chatId=document.getElementById('tgChatId').value;
  if(!token||!chatId) return;
  await fetch('https://api.telegram.org/bot'+token+'/sendMessage',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({chat_id:chatId, text, parse_mode:'HTML'}) });
}

async function fetchData(){
  const cid=document.getElementById('clientId').value.trim();
  const key=document.getElementById('apiKey').value.trim();
  if(!cid||!key){ showError('Введите Client ID и API ключ'); return; }
  saveCreds();
  document.getElementById('loadBtn').disabled=true;
  document.getElementById('loadBtn').textContent='Загрузка...';
  document.getElementById('errorBox').style.display='none';
  document.getElementById('debugLog').innerHTML='';

  const now=new Date();
  const dateTo=now.toISOString().replace('Z','+00:00');
  const dateFrom=new Date(now-30*24*60*60*1000).toISOString().replace('Z','+00:00');

  try {
    // 1. Загружаем МОИ ЦЕНЫ через v5
    log('Загружаем твои цены из Ozon...');
    const priceMap={};
    let lastId='';
    for(let i=0;i<10;i++){
      const pd=await ozon('/v5/product/info/prices',{ filter:{visibility:'ALL'}, last_id:lastId, limit:1000 });
      const items=pd?.result?.items||[];
      // Логируем структуру первого элемента для отладки
      if(i===0 && items.length>0){
        const sample=items[0];
        log('Структура цены: '+JSON.stringify(sample.price||sample).slice(0,200));
      }
      for(const item of items){
        // v5 может иметь разную структуру - пробуем все варианты
        const p = item.price || {};
        const myPrice = parseFloat(
          p.price || p.min_price || p.old_price || 
          item.min_price || item.price || 0
        );
        const info={ price: myPrice, name: item.name||item.offer_id||'' };
        if(item.offer_id) priceMap[String(item.offer_id)]=info;
        if(item.product_id) priceMap[String(item.product_id)]=info;
        if(item.sku) priceMap[String(item.sku)]=info;
      }
      lastId=pd?.result?.last_id||'';
      if(!lastId||items.length<1000) break;
    }
    log('Цен загружено: '+Object.keys(priceMap).length);

    // 2. Транзакции
    log('Загружаем транзакции...');
    let allOps=[], page=1;
    while(page<=10){
      const d=await ozon('/v3/finance/transaction/list',{
        filter:{date:{from:dateFrom,to:dateTo},operation_type:[],posting_number:'',transaction_type:'all'},
        page, page_size:500
      });
      const ops=d?.result?.operations||[];
      allOps=[...allOps,...ops];
      log('Стр.'+page+': '+ops.length+' операций');
      if(ops.length<500) break;
      page++;
    }
    log('Итого: '+allOps.length+' операций');

    // Логируем структуру первой операции с items
    const sampleOp=allOps.find(op=>(op.items||[]).length>0);
    if(sampleOp){
      const si=sampleOp.items[0];
      log('Пример item: '+JSON.stringify(si).slice(0,300));
    }

    // 3. Агрегация по SKU — начисление из транзакций
    const agg={};
    for(const op of allOps){
      const t=op.operation_type||'';
      if(!t.toLowerCase().includes('sale')&&!t.includes('AgentDelivered')&&!t.includes('Compensation')) continue;
      for(const item of op.items||[]){
        const key=String(item.sku||item.offer_id||item.product_id||'');
        if(!key) continue;
        const payout=parseFloat(item.payout||0);
        const qty=parseFloat(item.quantity||1);
        // Ищем цену в priceMap по разным ключам
        const priceInfo=priceMap[key]||priceMap[String(item.offer_id||'')]||priceMap[String(item.product_id||'')]||null;
        const myPrice=priceInfo?.price||0;
        const name=item.name||priceInfo?.name||key;
        if(!agg[key]) agg[key]={name, myPriceTotal:0, payoutTotal:0, qty:0};
        agg[key].payoutTotal+=payout;
        agg[key].myPriceTotal+=myPrice*qty;
        agg[key].qty+=qty;
      }
    }

    log('Позиций: '+Object.keys(agg).length);

    allProducts=Object.entries(agg).filter(([,p])=>p.qty>0).map(([key,p])=>{
      const avgPayout=p.payoutTotal/p.qty;
      const avgMyPrice=p.myPriceTotal/p.qty;
      const margin=avgMyPrice>0?(avgPayout-avgMyPrice)/avgMyPrice*100:null;
      return {key, name:p.name, total:p.payoutTotal, avgPayout, avgMyPrice, margin, diff:avgPayout-avgMyPrice, qty:p.qty};
    });

    if(allProducts.length===0){ showError('Нет данных о продажах за 30 дней.'); document.getElementById('loadBtn').disabled=false; document.getElementById('loadBtn').textContent='Загрузить статистику →'; return; }

    await sendTelegram();
    renderResults();
    document.getElementById('settings').style.display='none';
    document.getElementById('results').style.display='block';
    document.getElementById('settingsBtn').style.display='block';

  } catch(e){ showError(e.message); }
  document.getElementById('loadBtn').disabled=false;
  document.getElementById('loadBtn').textContent='Загрузить статистику →';
}

async function sendTelegram(){
  const sorted=[...allProducts].sort((a,b)=>b.total-a.total);
  const totalPayout=allProducts.reduce((s,p)=>s+p.total,0);
  const totalMyPrice=allProducts.reduce((s,p)=>s+p.avgMyPrice*p.qty,0);
  const overall=totalMyPrice>0?(totalPayout-totalMyPrice)/totalMyPrice*100:null;
  const fmt=n=>n!=null?Math.round(n).toLocaleString('ru-RU'):'—';
  const fmtPct=n=>n==null?'—':(n>0?'+':'')+n.toFixed(1)+'%';
  const medal=m=>m==null?'⚪':m>=0?'🟢':'🔴';
  let msg=`📊 <b>Ариадна · Ozon · ${new Date().toLocaleDateString('ru-RU')}</b>\n30 дней\n\n💰 Выплаты: <b>${fmt(totalPayout)} ₽</b>\n📈 Наценка: <b>${fmtPct(overall)}</b>\n📦 Позиций: ${allProducts.length}\n─────────────────\n`;
  for(let i=0;i<Math.min(sorted.length,25);i++){
    const p=sorted[i];
    const name=p.name.length>35?p.name.slice(0,35)+'…':p.name;
    msg+=`\n${medal(p.margin)} <b>#${i+1} ${name}</b>\n   Моя цена: ${fmt(p.avgMyPrice)} ₽ → Выплата: ${fmt(p.avgPayout)} ₽\n   <b>${fmtPct(p.margin)}</b> · ${Math.round(p.qty)} шт\n`;
    if(msg.length>3500){ await tg(msg); msg=''; }
  }
  if(sorted.length>25) msg+=`\n...ещё ${sorted.length-25} позиций`;
  if(msg) await tg(msg);
}

const fmt=n=>n!=null?Math.round(n).toLocaleString('ru-RU'):'—';
const fmtPct=n=>n==null?'—':(n>0?'+':'')+n.toFixed(1)+'%';
const mc=m=>m==null?'#888':m>=0?'#22c55e':'#ef4444';

function sortBy(key,btn){ currentSort=key; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); renderResults(); }

function renderResults(){
  const sorted=[...allProducts].sort((a,b)=>currentSort==='revenue'?b.total-a.total:currentSort==='margin'?(b.margin??-999)-(a.margin??-999):b.qty-a.qty);
  const totalPayout=allProducts.reduce((s,p)=>s+p.total,0);
  const totalMyPrice=allProducts.reduce((s,p)=>s+p.avgMyPrice*p.qty,0);
  const overall=totalMyPrice>0?(totalPayout-totalMyPrice)/totalMyPrice*100:null;
  document.getElementById('totalAccrual').textContent=fmt(totalPayout)+' ₽';
  document.getElementById('totalMargin').textContent=fmtPct(overall);
  document.getElementById('totalMargin').style.color=mc(overall);
  document.getElementById('prodList').innerHTML=sorted.map((p,i)=>`
    <div class="prod">
      <div class="prod-top">
        <div><div class="prod-id">#${i+1} · ${p.key}</div><div class="prod-name">${p.name.length>50?p.name.slice(0,50)+'…':p.name}</div></div>
        <div class="badge" style="background:${mc(p.margin)}22;border:1px solid ${mc(p.margin)}44;color:${mc(p.margin)}">${fmtPct(p.margin)}</div>
      </div>
      <div class="grid3">
        <div class="mini"><div class="mini-label">МОЯ ЦЕНА</div><div class="mini-val">${fmt(p.avgMyPrice)} ₽</div></div>
        <div class="mini"><div class="mini-label">ВЫПЛАТА/шт</div><div class="mini-val" style="color:#00d4ff">${fmt(p.avgPayout)} ₽</div></div>
        <div class="mini"><div class="mini-label">ПРОДАНО</div><div class="mini-val">${Math.round(p.qty)} шт</div></div>
      </div>
      <div class="diff-row">
        <span style="font-size:11px;color:#6b7280">Цена → выплата</span>
        <span style="font-size:13px;font-weight:600;color:${mc(p.margin)}">${p.diff>=0?'+':''}${fmt(p.diff)} ₽/шт</span>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
