<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozon Analytics v32</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, system-ui, sans-serif; background: #0f0f12; color: #e8e8f0; min-height: 100vh; }
.header { background: linear-gradient(135deg,#1a1a2e,#16213e); border-bottom: 1px solid #2a2a3e; padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
.logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg,#005bff,#00d4ff); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: #fff; flex-shrink: 0; }
.ver { font-size: 13px; font-weight: 700; color: #00d4ff; background: #001a4d; border-radius: 6px; padding: 3px 8px; margin-left: 6px; }
.body { padding: 20px; max-width: 600px; margin: 0 auto; }
.card { background: #1a1a2e; border-radius: 16px; padding: 20px; border: 1px solid #2a2a3e; margin-bottom: 14px; }
label { display: block; margin-bottom: 4px; font-size: 12px; color: #9ca3af; font-weight: 500; }
input { width: 100%; padding: 12px 14px; border-radius: 10px; background: #0f0f12; border: 1px solid #2a2a3e; color: #e8e8f0; font-size: 15px; margin-bottom: 14px; outline: none; }
.btn { width: 100%; padding: 16px; background: linear-gradient(135deg,#005bff,#0095ff); border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
.btn:disabled { background: #1a2a3a; cursor: not-allowed; }
.error { background: #2a1010; border: 1px solid #5a1010; border-radius: 12px; padding: 14px; color: #f87171; font-size: 13px; margin-bottom: 14px; display:none; }
.debug { background: #0f1a0f; border: 1px solid #1a3a1a; border-radius: 12px; padding: 12px; margin-bottom: 14px; font-family: monospace; font-size: 11px; color: #4ade80; display:none; word-break: break-all; max-height: 250px; overflow-y: auto; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.sum-card { background: #1a1a2e; border-radius: 14px; padding: 16px; border: 1px solid #2a2a3e; }
.sum-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
.sum-val { font-size: 20px; font-weight: 700; }
.tabs { display: flex; gap: 6px; margin-bottom: 16px; background: #1a1a2e; border-radius: 12px; padding: 4px; border: 1px solid #2a2a3e; }
.tab { flex: 1; padding: 8px 4px; border-radius: 8px; border: none; background: transparent; color: #6b7280; font-size: 12px; cursor: pointer; }
.tab.active { background: #005bff; color: #fff; font-weight: 600; }
.prod { background: #1a1a2e; border-radius: 14px; padding: 16px; border: 1px solid #2a2a3e; margin-bottom: 10px; }
.prod-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.prod-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.prod-id { font-size: 11px; color: #6b7280; margin-bottom: 2px; }
.badge { border-radius: 8px; padding: 4px 10px; font-size: 15px; font-weight: 700; white-space: nowrap; flex-shrink: 0; margin-left: 10px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
.mini { background: #0f0f12; border-radius: 8px; padding: 8px 10px; }
.mini-label { font-size: 10px; color: #6b7280; margin-bottom: 2px; }
.mini-val { font-size: 13px; font-weight: 600; }
.diff-row { margin-top: 8px; background: #0f0f12; border-radius: 8px; padding: 8px 10px; display: flex; justify-content: space-between; }
.settings-btn { margin-left: auto; background: none; border: 1px solid #2a2a3e; color: #9ca3af; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; display:none; }
#results { display: none; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">O</div>
  <div>
    <div style="font-size:16px;font-weight:700"><span id="cabName">Кабинет</span> <span class="ver">v32</span></div>
    <div style="font-size:11px;color:#6b7280">Ozon Analytics · Наценка · 30 дней</div>
  </div>
  <button class="settings-btn" id="settingsBtn" onclick="showSettings()">⚙ Ключи</button>
</div>
<div class="body">
  <div id="settings">
    <div class="card">
      <label>Client ID</label><input type="text" inputmode="numeric" id="clientId" placeholder="2375416">
      <label>API ключ</label><input type="password" id="apiKey" placeholder="••••••••••••">
      <label>Telegram Bot Token</label><input type="text" id="tgToken" placeholder="8819121520:AAG...">
      <label>Telegram Chat ID</label><input type="text" id="tgChatId" placeholder="8819121520">
    </div>
    <div class="debug" id="debugLog"></div>
    <div class="error" id="errorBox"></div>
    <button class="btn" id="loadBtn" onclick="fetchData()">Загрузить статистику →</button>
    
  </div>
  <div id="results">
    <div class="grid2">
      <div class="sum-card"><div class="sum-label">ЧИСТЫМИ НА СЧЁТ</div><div class="sum-val" id="totalAccrual" style="color:#00d4ff"></div></div>
      <div class="sum-card"><div class="sum-label">ПРОДАНО ПО РРЦ</div><div class="sum-val" id="totalRrc" style="color:#a78bfa"></div></div>
    </div>
    <div class="sum-card" style="margin-bottom:16px;text-align:center"><div class="sum-label">НАЦЕНКА (от РРЦ)</div><div class="sum-val" id="totalMargin"></div></div>
    <div class="sum-card" style="margin-bottom:16px;text-align:center;background:#1a1410;border-color:#3a2a1a"><div class="sum-label" style="color:#f59e0b">РЕКЛАМА (общая, не по товарам)</div><div class="sum-val" id="totalAds" style="color:#f59e0b;font-size:18px"></div></div>
    <div class="tabs">
      <button class="tab active" onclick="sortBy('revenue',this)">По выплате</button>
      <button class="tab" onclick="sortBy('margin',this)">По наценке</button>
      <button class="tab" onclick="sortBy('qty',this)">По кол-ву</button>
    </div>
    <div id="prodList"></div>
  </div>
</div>
<script>
const VERSION='v32';
let allProducts=[], adsTotal=0, cabName='Кабинет', currentSort='revenue';

// --- helpers ---
const fmt=n=>n!=null?Math.round(n).toLocaleString('ru-RU'):'—';
const fmtPct=n=>n==null?'—':(n>0?'+':'')+n.toFixed(1)+'%';
const mc=m=>m==null?'#888':m>=0?'#22c55e':'#ef4444';
function ls(k,v){ try{ if(v===undefined) return localStorage.getItem(k); localStorage.setItem(k,v); }catch(e){} }
function $(id){ return document.getElementById(id); }
function cid(){ return $('clientId').value.trim(); }
function akey(){ return $('apiKey').value.trim(); }

window.onload=()=>{
  $('clientId').value=ls('oz_cid')||'';
  $('apiKey').value=ls('oz_key')||'';
  $('tgToken').value=ls('oz_tgt')||'';
  $('tgChatId').value=ls('oz_tgc')||'';
};
function saveCreds(){
  ls('oz_cid',$('clientId').value); ls('oz_key',$('apiKey').value);
  ls('oz_tgt',$('tgToken').value); ls('oz_tgc',$('tgChatId').value);
}
function log(msg){ const el=$('debugLog'); el.style.display='block'; el.innerHTML+='› '+msg+'<br>'; el.scrollTop=el.scrollHeight; }
function showError(msg){ const el=$('errorBox'); el.style.display='block'; el.textContent='⚠ '+msg; }
function showSettings(){
  $('settings').style.display='block'; $('results').style.display='none';
  $('settingsBtn').style.display='none';
  $('debugLog').style.display='none'; $('debugLog').innerHTML='';
  $('errorBox').style.display='none';
}

// --- API ---
async function ozon(endpoint, body){
  const r=await fetch('https://api-seller.ozon.ru'+endpoint,{
    method:'POST',
    headers:{'Client-Id':cid(),'Api-Key':akey(),'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error('HTTP '+r.status+' '+endpoint);
  return r.json();
}
async function tg(text){
  const token=$('tgToken').value, chatId=$('tgChatId').value;
  if(!token||!chatId) return;
  await fetch('https://api.telegram.org/bot'+token+'/sendMessage',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:chatId,text,parse_mode:'HTML'})
  });
}

// --- Имя кабинета ---
async function loadCabinetName(){
  try {
    const d=await ozon('/v1/seller/info',{});
    const c=d?.company||d?.result?.company||d?.result||d||{};
    const name=c.legal_name||c.name||d?.name;
    if(name){ cabName=name; $('cabName').textContent=name; log('Кабинет: '+name); }
  } catch(e){ log('Кабинет ✗ '+e.message); }
}

// --- Цены ("моя цена" = item.price) ---
async function loadPrices(priceMap){
  log('Загрузка цен...');
  // Прогрев: одиночный запрос перед батчами (иначе батч может вернуть пусто)
  try {
    const pl=await ozon('/v3/product/list',{filter:{visibility:'ALL'},last_id:'',limit:1});
    const id=(pl?.result?.items||[])[0]?.product_id;
    if(id) await ozon('/v3/product/info/list',{product_id:[id]});
  } catch(e){}

  // Собираем все product_id
  const productIds=[];
  let lastId='';
  for(let i=0;i<20;i++){
    const d=await ozon('/v3/product/list',{filter:{visibility:'ALL'},last_id:lastId,limit:1000});
    const items=d?.result?.items||[];
    items.forEach(it=>{ if(it.product_id) productIds.push(it.product_id); });
    lastId=d?.result?.last_id||'';
    if(!lastId||items.length<1000) break;
  }

  // Тянем карточки батчами по 100, индексируем цену по всем вариантам SKU
  let priceCount=0, firstEmpty=true;
  for(let i=0;i<productIds.length;i+=100){
    const batch=productIds.slice(i,i+100);
    let items=[];
    try {
      const d=await ozon('/v3/product/info/list',{product_id:batch});
      items=d?.result?.items||d?.items||[];
      // Если батч вернул пусто — повтор по одному (прогрев) и ещё раз батчем
      if(!items.length && firstEmpty){
        firstEmpty=false;
        try { await ozon('/v3/product/info/list',{product_id:[batch[0]]}); } catch(e){}
        const d2=await ozon('/v3/product/info/list',{product_id:batch});
        items=d2?.result?.items||d2?.items||[];
      }
    } catch(e){}
    for(const item of items){
      const myPrice=parseFloat(String(item.price||0).replace(',','.'))||0;
      const info={price:myPrice, name:item.name||''};
      [item.offer_id,item.id,item.product_id,item.sku,item.fbo_sku,item.fbs_sku]
        .forEach(k=>{ if(k) priceMap[String(k)]=info; });
      (item.sources||[]).forEach(s=>{ if(s.sku) priceMap[String(s.sku)]=info; });
      if(myPrice>0) priceCount++;
    }
  }
  log('Цен загружено: '+priceCount);
}

// --- Транзакции за 30 дней ---
async function loadTransactions(){
  const now=new Date();
  const to=now.toISOString().replace('Z','+00:00');
  const from=new Date(now-30*24*60*60*1000).toISOString().replace('Z','+00:00');
  log('Транзакции...');
  let ops=[], page=1;
  while(page<=10){
    const d=await ozon('/v3/finance/transaction/list',{
      filter:{date:{from,to},operation_type:[],posting_number:'',transaction_type:'all'},
      page, page_size:500
    });
    const batch=d?.result?.operations||[];
    ops=ops.concat(batch);
    log('Стр.'+page+': '+batch.length);
    if(batch.length<500) break;
    page++;
  }
  return ops;
}

const isAd=t=>t.includes('promotion')||t.includes('advert');
const isSale=t=>t.includes('sale')||t.includes('agentdelivered');

// --- Агрегация: чистая выплата по постингам ---
function aggregate(ops, priceMap){
  // Чистая выплата заказа = сумма amount всех его операций (продажа +, удержания -)
  // Начислено заказа = accruals_for_sale операций продажи (до вычета расходов)
  // Реклама не имеет привязки к товару — считаем отдельной общей суммой
  const net={}, gross={}, items={};
  adsTotal=0;
  for(const op of ops){
    const pn=op.posting?.posting_number || op.posting_number || '';
    const amount=parseFloat(op.amount||0)||0;
    const type=(op.operation_type||'').toLowerCase();
    if(isAd(type)){ adsTotal+=amount; continue; } // реклама — мимо постингов
    if(!pn) continue;
    net[pn]=(net[pn]||0)+amount;
    if(isSale(type) && (op.items||[]).length){
      gross[pn]=(gross[pn]||0)+(parseFloat(op.accruals_for_sale||0)||0);
      if(!items[pn]){
        items[pn]=op.items.map(it=>({
          sku:String(it.sku||it.offer_id||it.product_id||''),
          name:it.name||'',
          qty:parseFloat(it.quantity||1)||1
        }));
      }
    }
  }

  // Раскидываем выплату и начисление постинга по его товарам пропорционально количеству
  const agg={};
  for(const pn in items){
    const list=items[pn];
    const payoutPn=net[pn]||0;
    const grossPn=gross[pn]||0;
    const totalQty=list.reduce((s,it)=>s+it.qty,0)||1;
    for(const it of list){
      const key=it.sku; if(!key) continue;
      const pi=priceMap[key]||null;
      if(!agg[key]) agg[key]={name:it.name||pi?.name||key, myPriceTotal:0, payoutTotal:0, grossTotal:0, qty:0};
      agg[key].payoutTotal+=payoutPn*(it.qty/totalQty);
      agg[key].grossTotal+=grossPn*(it.qty/totalQty);
      agg[key].myPriceTotal+=(pi?.price||0)*it.qty;
      agg[key].qty+=it.qty;
    }
  }
  return agg;
}

// --- Главный поток ---
async function fetchData(){
  if(!cid()||!akey()){ showError('Введите Client ID и API ключ'); return; }
  saveCreds();
  const btn=$('loadBtn');
  btn.disabled=true; btn.textContent='Загрузка...';
  $('errorBox').style.display='none';
  $('debugLog').innerHTML='';
  try {
    const priceMap={};
    await loadPrices(priceMap);
    await loadCabinetName();
    const ops=await loadTransactions();
    const agg=aggregate(ops, priceMap);

    const withPrice=Object.values(agg).filter(p=>p.myPriceTotal>0).length;
    log('Позиций: '+Object.keys(agg).length+', с ценой: '+withPrice);

    allProducts=Object.entries(agg).filter(([,p])=>p.qty>0).map(([key,p])=>{
      const avgPayout=p.payoutTotal/p.qty;
      const avgMyPrice=p.myPriceTotal/p.qty;
      const avgRrc=avgMyPrice/2;            // РРЦ = моя цена ÷ 2
      const avgGross=p.grossTotal/p.qty;
      const margin=avgRrc>0?(avgPayout-avgRrc)/avgRrc*100:null;  // наценка от РРЦ
      return {key, name:p.name, total:p.payoutTotal, avgPayout, avgGross, avgMyPrice, avgRrc, margin, diff:avgPayout-avgRrc, qty:p.qty};
    });

    if(!allProducts.length){ showError('Нет данных за период.'); return; }
    await sendTelegram();
    renderResults();
    $('results').style.display='block';
    $('settingsBtn').style.display='block';
  } catch(e){
    showError(e.message);
  } finally {
    btn.disabled=false; btn.textContent='Загрузить статистику →';
  }
}

// --- Итоги ---
function totals(){
  const tp=allProducts.reduce((s,p)=>s+p.total,0);              // чистыми на счёт
  const trrc=allProducts.reduce((s,p)=>s+p.avgRrc*p.qty,0);     // продано по РРЦ
  return {tp, trrc, ov: trrc>0?(tp-trrc)/trrc*100:null};        // наценка от РРЦ
}

// --- Telegram-отчёт ---
async function sendTelegram(){
  const {tp,trrc,ov}=totals();
  const sorted=[...allProducts].sort((a,b)=>b.total-a.total);
  const fp=n=>n==null?'—':(n>0?'+':'')+n.toFixed(1)+'%';
  const md=m=>m==null?'⚪':m>=0?'🟢':'🔴';
  const today=new Date().toLocaleDateString('ru-RU');
  let msg=`📊 <b>${cabName} · Ozon · ${today}</b>\n30 дней\n\n`+
          `💰 Чистыми: <b>${fmt(tp)} ₽</b>\n🏷 Продано по РРЦ: <b>${fmt(trrc)} ₽</b>\n📈 Наценка: <b>${fp(ov)}</b>\n`+
          `📦 Позиций: ${allProducts.length}\n🎯 Реклама: ${fmt(adsTotal)} ₽\n─────────────────\n`;
  for(let i=0;i<Math.min(sorted.length,25);i++){
    const p=sorted[i];
    const nm=p.name.length>35?p.name.slice(0,35)+'…':p.name;
    msg+=`\n${md(p.margin)} <b>#${i+1} ${nm}</b>\n   РРЦ: ${fmt(p.avgRrc)} ₽ → Чистыми: ${fmt(p.avgPayout)} ₽\n   <b>${fp(p.margin)}</b> · ${Math.round(p.qty)} шт\n`;
    if(msg.length>3500){ await tg(msg); msg=''; }
  }
  if(sorted.length>25) msg+=`\n…ещё ${sorted.length-25}`;
  if(msg) await tg(msg);
}

// --- Рендер ---
function sortBy(key,btn){
  currentSort=key;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderResults();
}
function renderResults(){
  const {tp,trrc,ov}=totals();
  const sorted=[...allProducts].sort((a,b)=>
    currentSort==='revenue'? b.total-a.total :
    currentSort==='margin' ? (b.margin??-1e9)-(a.margin??-1e9) :
                             b.qty-a.qty);
  $('totalAccrual').textContent=fmt(tp)+' ₽';
  $('totalRrc').textContent=fmt(trrc)+' ₽';
  $('totalMargin').textContent=fmtPct(ov);
  $('totalMargin').style.color=mc(ov);
  $('totalAds').textContent=fmt(adsTotal)+' ₽';
  $('prodList').innerHTML=sorted.map((p,i)=>`
    <div class="prod">
      <div class="prod-top">
        <div><div class="prod-id">#${i+1} · ${p.key}</div><div class="prod-name">${p.name.length>50?p.name.slice(0,50)+'…':p.name}</div></div>
        <div class="badge" style="background:${mc(p.margin)}22;border:1px solid ${mc(p.margin)}44;color:${mc(p.margin)}">${fmtPct(p.margin)}</div>
      </div>
      <div class="grid4">
        <div class="mini"><div class="mini-label">МОЯ ЦЕНА</div><div class="mini-val">${fmt(p.avgMyPrice)} ₽</div></div>
        <div class="mini"><div class="mini-label">РРЦ</div><div class="mini-val" style="color:#a78bfa">${fmt(p.avgRrc)} ₽</div></div>
        <div class="mini"><div class="mini-label">ЧИСТЫМИ</div><div class="mini-val" style="color:#00d4ff">${fmt(p.avgPayout)} ₽</div></div>
        <div class="mini"><div class="mini-label">ПРОДАНО</div><div class="mini-val">${Math.round(p.qty)} шт</div></div>
      </div>
      <div class="diff-row">
        <span style="font-size:11px;color:#6b7280">Начислено/шт (до расходов)</span>
        <span style="font-size:13px;font-weight:600;color:#9ca3af">${fmt(p.avgGross)} ₽</span>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
